services:
  agent-vault-proxy:
    build: .
    container_name: agent-vault-proxy
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite vault (keys/users/audit logs)
      - ./data:/app/data
    environment:
      # Required encryption key for database secrets at rest
      - AGENT_VAULT_KEY=${AGENT_VAULT_KEY}
      - AGENT_VAULT_APP_DIR=/app/data
      - REQUIRE_AGENT_AUTH=${REQUIRE_AGENT_AUTH:-true}
      # Chroma configuration (customizable host/port)
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
