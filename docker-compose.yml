version: '3.8'

services:
  agent-vault-proxy:
    build: .
    container_name: agent-vault-proxy
    ports:
      - "8080:8080"
    volumes:
      # Mount your local secrets.json into the container
      - ./secrets.json:/app/secrets.json:ro
      # Or use a Docker secret (more secure)
      # - type: bind
      #   source: ./secrets.json
      #   target: /app/secrets.json
      #   read_only: true
    environment:
      # Alternative: Use environment variables
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GITHUB_PAT=${GITHUB_PAT:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      # Or specify secrets file location
      - SECRETS_FILE=/app/secrets.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
